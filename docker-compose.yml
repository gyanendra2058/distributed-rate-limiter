services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rate_limiter
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    environment:
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5000
      - API_SERVICE_URL=http://api:3000
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    deploy:
      replicas: 3

  config-service:
    build: ./config-service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=rate_limiter
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - API_GATEWAY_URL=http://nginx:80
      - CONFIG_SERVICE_URL=http://config-service:4000
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      - nginx

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - config-service

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api-gateway

volumes:
  pgdata:
