<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distributed Rate Limiter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

  <!-- Top Bar -->
  <header class="bg-slate-800 border-b border-slate-700 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-4">
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></div>
        <h1 class="text-xl font-bold tracking-tight">Distributed Rate Limiter</h1>
        <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-400">Demo</span>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <label for="user-id-input" class="text-sm text-slate-400">User ID:</label>
          <input id="user-id-input" type="text" value="demo-user-1"
            class="bg-slate-700 border border-slate-600 rounded px-3 py-1.5 text-sm w-40 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
        <div class="flex items-center gap-2">
          <label for="algo-select" class="text-sm text-slate-400">Algorithm:</label>
          <select id="algo-select"
            class="bg-slate-700 border border-slate-600 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <option value="token-bucket">Token Bucket</option>
            <option value="sliding-window">Sliding Window</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="bg-slate-800/50 border-b border-slate-700">
    <div class="max-w-7xl mx-auto flex">
      <button class="tab-btn active" data-tab="api-tester">API Tester</button>
      <button class="tab-btn" data-tab="admin">Admin Config</button>
      <button class="tab-btn" data-tab="metrics">Live Metrics</button>
      <button class="tab-btn" data-tab="comparison">Algorithm Comparison</button>
    </div>
  </nav>

  <!-- Tab Panels -->
  <main class="max-w-7xl mx-auto px-6 py-6">
    <div id="panel-api-tester" class="tab-panel"></div>
    <div id="panel-admin" class="tab-panel hidden"></div>
    <div id="panel-metrics" class="tab-panel hidden"></div>
    <div id="panel-comparison" class="tab-panel hidden"></div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 flex flex-col gap-2 z-50"></div>

  <script src="/js/state.js"></script>
  <script src="/js/api-client.js"></script>
  <script src="/js/api-tester.js"></script>
  <script src="/js/admin-panel.js"></script>
  <script src="/js/metrics-panel.js"></script>
  <script src="/js/algo-comparison.js"></script>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.remove('hidden');

        if (btn.dataset.tab === 'metrics') MetricsPanel.onShow();
        if (btn.dataset.tab !== 'metrics') MetricsPanel.onHide();
        if (btn.dataset.tab === 'admin') AdminPanel.refresh();
      });
    });

    // Bind state inputs
    document.getElementById('user-id-input').addEventListener('input', e => {
      AppState.set('userId', e.target.value || 'anonymous');
    });
    document.getElementById('algo-select').addEventListener('change', e => {
      AppState.set('algorithm', e.target.value);
    });

    // Initialize panels
    ApiTester.init(document.getElementById('panel-api-tester'));
    AdminPanel.init(document.getElementById('panel-admin'));
    MetricsPanel.init(document.getElementById('panel-metrics'));
    AlgoComparison.init(document.getElementById('panel-comparison'));
  </script>
</body>
</html>
